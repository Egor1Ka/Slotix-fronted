name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/egor1ka/slotix-fronted

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_GA_ID=${{ vars.NEXT_PUBLIC_GA_ID }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and update web service
        uses: appleboy/ssh-action@v1
        env:
          CREEM_API_KEY: ${{ secrets.CREEM_API_KEY }}
          CREEM_PRODUCT_ORG_CREATOR: ${{ secrets.CREEM_PRODUCT_ORG_CREATOR }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: CREEM_API_KEY,CREEM_PRODUCT_ORG_CREATOR
          script: |
            set -euo pipefail
            cd /opt/slotix
            umask 077
            touch .env
            # обновляем только CREEM_* ключи, остальное (BACKEND_URL и пр.) не трогаем
            grep -v -E '^(CREEM_API_KEY|CREEM_PRODUCT_ORG_CREATOR)=' .env > .env.tmp || true
            {
              echo "CREEM_API_KEY=${CREEM_API_KEY}"
              echo "CREEM_PRODUCT_ORG_CREATOR=${CREEM_PRODUCT_ORG_CREATOR}"
            } >> .env.tmp
            chmod 600 .env.tmp
            mv .env.tmp .env
            docker compose -f docker-compose.prod.yml pull web
            docker compose -f docker-compose.prod.yml up -d --force-recreate web
            docker image prune -f

      - name: Debug — inspect deployed container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set +e
            cd /opt/slotix
            echo "=========================================="
            echo "1. docker-compose.prod.yml"
            echo "=========================================="
            cat docker-compose.prod.yml
            echo
            echo "=========================================="
            echo "2. .env keys (values masked)"
            echo "=========================================="
            sed -E 's/^([A-Z_]+)=.*/\1=***/' .env
            echo
            echo "=========================================="
            echo "3. container env (CREEM/BACKEND/NEXT_PUBLIC, values masked)"
            echo "=========================================="
            docker compose -f docker-compose.prod.yml exec -T web printenv \
              | grep -E '^(CREEM|BACKEND|NEXT_PUBLIC)' \
              | sed -E 's/=.*/=***/' || echo "(no matching vars in container)"
            echo
            echo "=========================================="
            echo "4. container running?"
            echo "=========================================="
            docker compose -f docker-compose.prod.yml ps web
